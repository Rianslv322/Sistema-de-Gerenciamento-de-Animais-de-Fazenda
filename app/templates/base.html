<!DOCTYPE html>
<html lang="pt-br">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>{% block title %} {% endblock %}</title>
    <link rel="stylesheet" href="{{ url_for('static', filename='css/base.css') }}">
    {% block css %} {% endblock %}
</head>
<body>
    <header>
        <div class="logo-header">
            <img src="{{ url_for('static', filename='img/logo.png') }}" alt="" id="logo-header-img">
        </div>
        <div class="title-header">
            <h1>{% block header %} Sistema de Gerenciamento de Animais de Fazenda {% endblock %}</h1>
        </div>
        <div class="perfil-header">
            <img src="{{ url_for('static', filename='img/perfil.png') }}" alt="" id="perfil-img">
            <h1>{{ current_user.primeiro_nome() }}</h1>
        </div>
        <div class="sair-header">
            <a href="{{ url_for('sair') }}"><img src="{{ url_for('static', filename='img/icone_sair.png') }}" alt="" id="icone-sair-img"></a>
        </div>
    </header>

    <main>
        <aside class="menu-lateral">
            <div class="icones-menu">
                <a href="{{ url_for('dashboard') }}" class="dashboard-menu {% if request.endpoint == 'dashboard'%} icone-menu-ativo {% endif %}">
                    <img src="{{ url_for('static', filename='img/dashboard.png') }}" alt="">
                </a>
                <a href="{{ url_for('animal') }}" class="cadastro-animal-menu {% if request.endpoint == 'animal'%} icone-menu-ativo {% endif %}">
                    <img src="{{ url_for('static', filename='img/pata_animal.png') }}" alt="">
                </a>
                <a href="{{ url_for('alimentacao') }}" class="relatorio-menu {% if request.endpoint == 'alimentacao'%} icone-menu-ativo {% endif %}">
                    <img src="{{ url_for('static', filename='img/icone_trigo.png') }}" alt="">
                </a>
                <a href="{{ url_for('saude') }}" class="saude-animal-menu {% if request.endpoint == 'saude'%} icone-menu-ativo {% endif %}">
                    <img src="{{ url_for('static', filename='img/saude_animal.png') }}" alt="">
                </a>
                <a href="{{ url_for('vacina') }}" class="relatorio-menu {% if request.endpoint == 'vacina'%} icone-menu-ativo {% endif %}">
                    <img src="{{ url_for('static', filename='img/icone_vacina.png') }}" alt="">
                </a>
                <a href="{{ url_for('relatorio') }}" class="relatorio-menu {% if request.endpoint == 'relatorio'%} icone-menu-ativo {% endif %}">
                    <img src="{{ url_for('static', filename='img/relatorio.png') }}" alt="">
                </a>
            </div>
            <div class="categorias-menu">
                <a href="{{ url_for('dashboard') }}" class="dashboard-menu {% if request.endpoint == 'dashboard' %} categoria-menu-ativa {% endif %}">Dashboard</a>
                <a href="{{ url_for('animal') }}" class="cadastro-animal-menu {% if request.endpoint == 'animal' %} categoria-menu-ativa {% endif %}">Animais</a>
                <a href="{{ url_for('alimentacao') }}" class="relatorio-menu {% if request.endpoint == 'alimentacao' %} categoria-menu-ativa {% endif %}">Alimentação</a>
                <a href="{{ url_for('saude') }}" class="saude-animal-menu {% if request.endpoint == 'saude' %} categoria-menu-ativa {% endif %}">Saúde</a>
                <a href="{{ url_for('vacina') }}" class="relatorio-menu {% if request.endpoint == 'vacina' %} categoria-menu-ativa {% endif %}">Vacinas</a>
                <a href="{{ url_for('relatorio') }}" class="relatorio-menu {% if request.endpoint == 'relatorio' %} categoria-menu-ativa {% endif %}">Relatório</a>
            </div>
        </aside>

        <div class="principal">
            {% block content %}

            {% endblock %}
        </div> 
    </main>
</body>
</html>
