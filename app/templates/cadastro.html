<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Cadastro</title>
    <link rel="stylesheet" href="{{ url_for('static', filename='css/cadastro.css') }}">
</head>
<body>
    <div class="menu">
        <div class="img">
            <img class="foto_animal" src="{{ url_for('static', filename='img/logo.png') }}" alt="Imagem de Login">
        </div>

        <div class="login">
            <form action="#">
                <div class="div_borda">
                    <h1>CADASTRO</h1>
                    <label for="nome">Nome Completo ou Razão Social:</label>
                    <input  id="nome" name="nome" required><br>
                    
                    <label for="dados">CPF/CNPJ:</label>
                    <input  id="dados" required><br>
                    
                    <label for="cep">CEP:</label>
                    <input  id="cep" required><br>

                    <label for="email">Email:</label>
                    <input  id="email" required><br>

                    <label for="senha">Senha:</label>
                    <input  id="cep" required><br>

                    <button type="submit">Entrar</button>
                </div>
            </form>
        </div>
    </div>
</body>
</html>
