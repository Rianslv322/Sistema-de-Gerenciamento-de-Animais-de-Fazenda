<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Login</title>
    <link rel="stylesheet" href="{{ url_for('static', filename='css/cadastro.css') }}">
</head>
<body>
    <div class="menu">
        <div class="img">
            <img class="foto_animal" src="{{ url_for('static', filename='img/logo.png') }}" alt="Imagem de Login">
        </div>

        <div class="login">
            <form class="entrar" action="">
                <div class="div_borda">
                    <h1>Login</h1>
                    
                    <label for="email">Email</label>
                    <input type="email" id="email" name="email"><br>
                    
                    <label for="senha">Senha</label>
                    <input type="password" id="senha" name="senha"><br>

                    <button type="submit">Entrar</button>
                    <a href="#" class="verificacao">Esqueci a senha</a>
                </div>
            </form>
        </div>
    </div>
</body>
</html>
